<!-- API Key Modal - Add this ONCE inside <body> before closing tag -->
<div id="api-key-modal" style="display:none; position:fixed; inset:0; z-index:999999; background:rgba(0,0,0,0.6); align-items:center; justify-content:center;">
  <div style="background:#fff; border-radius:16px; padding:2rem; max-width:460px; width:90%; box-shadow:0 20px 60px rgba(0,0,0,0.3);" class="dark:bg-gray-900">
    <div style="display:flex; align-items:center; gap:12px; margin-bottom:1.5rem;">
      <div style="width:40px;height:40px;background:#3b82f6;border-radius:10px;display:flex;align-items:center;justify-content:center;">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>
      <div>
        <h3 style="font-size:17px;font-weight:600;color:#111;" class="dark:text-white">Enter API Key</h3>
        <p style="font-size:13px;color:#6b7280;">Required to use AI features</p>
      </div>
    </div>
    <p style="font-size:13px;color:#6b7280;margin-bottom:1rem;line-height:1.6;">
      Get your free API key at <a href="https://console.anthropic.com" target="_blank" style="color:#3b82f6;">console.anthropic.com</a>. Your key is stored locally in your browser only.
    </p>
    <input 
      id="api-key-input" 
      type="password" 
      placeholder="sk-ant-api03-..." 
      style="width:100%;padding:12px 16px;border:1px solid #e5e7eb;border-radius:10px;font-size:14px;font-family:monospace;margin-bottom:1rem;box-sizing:border-box;background:#f9fafb;"
      class="dark:bg-gray-800 dark:border-gray-700 dark:text-white dark:placeholder:text-gray-500"
    />
    <div style="display:flex;gap:10px;">
      <button 
        onclick="(() => { const k = document.getElementById('api-key-input').value; if(k.trim()) { window.aiChat.setApiKey(k); } })()"
        style="flex:1;padding:11px;background:#111;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;"
        class="hover:opacity-90"
      >
        Save & Continue
      </button>
      <button 
        onclick="document.getElementById('api-key-modal').style.display='none'"
        style="padding:11px 18px;background:#f3f4f6;color:#374151;border:none;border-radius:10px;font-size:14px;cursor:pointer;"
      >
        Skip
      </button>
    </div>
    <p style="font-size:12px;color:#9ca3af;margin-top:12px;text-align:center;">Your key is never sent to any server other than Anthropic.</p>
  </div>
</div>
