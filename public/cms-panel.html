<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CMS Management - Admin Panel</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f5f5f5;
      color: #333;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      margin-bottom: 30px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    header h1 {
      font-size: 28px;
      margin-bottom: 5px;
    }

    header p {
      opacity: 0.9;
      font-size: 14px;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      border-bottom: 2px solid #ddd;
      flex-wrap: wrap;
    }

    .tab-btn {
      padding: 12px 24px;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 16px;
      color: #666;
      border-bottom: 3px solid transparent;
      transition: all 0.3s;
    }

    .tab-btn.active {
      color: #667eea;
      border-bottom-color: #667eea;
    }

    .tab-btn:hover {
      color: #667eea;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .section-header h2 {
      font-size: 24px;
    }

    button {
      padding: 10px 20px;
      background-color: #667eea;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.3s;
    }

    button:hover {
      background-color: #5568d3;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: 600;
      font-size: 14px;
    }

    input[type="text"],
    input[type="number"],
    input[type="file"],
    textarea,
    select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
      font-family: inherit;
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: white;
      padding: 30px;
      border-radius: 8px;
      width: 90%;
      max-width: 500px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .modal-header h3 {
      font-size: 20px;
    }

    .close-btn {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: #999;
    }

    .modal-footer {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 20px;
    }

    .modal-footer button {
      flex: 0;
    }

    .table-wrapper {
      background: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      background-color: #f8f9fa;
      padding: 15px;
      text-align: left;
      font-weight: 600;
      border-bottom: 2px solid #ddd;
    }

    td {
      padding: 15px;
      border-bottom: 1px solid #ddd;
    }

    tr:hover {
      background-color: #f9f9f9;
    }

    .action-btn {
      padding: 6px 12px;
      font-size: 12px;
      margin-right: 5px;
    }

    .delete-btn {
      background-color: #e74c3c;
    }

    .delete-btn:hover {
      background-color: #c0392b;
    }

    .edit-btn {
      background-color: #f39c12;
    }

    .edit-btn:hover {
      background-color: #d68910;
    }

    .image-preview {
      width: 100%;
      max-width: 200px;
      margin-top: 10px;
      border-radius: 4px;
      border: 1px solid #ddd;
    }

    .alert {
      padding: 12px 16px;
      border-radius: 4px;
      margin-bottom: 15px;
    }

    .alert-success {
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .alert-error {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .loading {
      text-align: center;
      padding: 20px;
      color: #999;
    }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: #999;
    }

    @media (max-width: 768px) {
      .form-row {
        grid-template-columns: 1fr;
      }

      .section-header {
        flex-direction: column;
        align-items: flex-start;
      }

      .section-header h2 {
        margin-bottom: 15px;
      }

      table {
        font-size: 12px;
      }

      .tabs {
        flex-wrap: wrap;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>📊 CMS Management Panel</h1>
      <p>Manage your store's content, products, banners, and categories</p>
    </header>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('banners')">🖼️ Banners</button>
      <button class="tab-btn" onclick="switchTab('categories')">📂 Categories</button>
      <button class="tab-btn" onclick="switchTab('products')">📦 Products</button>
    </div>

    <!-- BANNERS TAB -->
    <div id="banners" class="tab-content active">
      <div class="section-header">
        <h2>Banners & Sliders</h2>
        <button onclick="openBannerModal()">+ Add Banner</button>
      </div>
      <div id="banners-list" class="table-wrapper loading">Loading...</div>
    </div>

    <!-- CATEGORIES TAB -->
    <div id="categories" class="tab-content">
      <div class="section-header">
        <h2>Categories</h2>
        <button onclick="openCategoryModal()">+ Add Category</button>
      </div>
      <div id="categories-list" class="table-wrapper loading">Loading...</div>
    </div>

    <!-- PRODUCTS TAB -->
    <div id="products" class="tab-content">
      <div class="section-header">
        <h2>Products</h2>
        <button onclick="openProductModal()">+ Add Product</button>
      </div>
      <div id="products-list" class="table-wrapper loading">Loading...</div>
    </div>
  </div>

  <!-- BANNER MODAL -->
  <div id="banner-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Add/Edit Banner</h3>
        <button class="close-btn" onclick="closeBannerModal()">×</button>
      </div>
      <form id="banner-form">
        <div class="form-group">
          <label>Title</label>
          <input type="text" id="banner-title" required>
        </div>
        <div class="form-group">
          <label>Subtitle</label>
          <input type="text" id="banner-subtitle">
        </div>
        <div class="form-group">
          <label>Image Upload</label>
          <input type="file" id="banner-image" accept="image/*" onchange="previewBannerImage()">
          <img id="banner-preview" class="image-preview" style="display:none;">
        </div>
        <div class="form-group">
          <label>Button Text</label>
          <input type="text" id="banner-button-text" value="Shop Now">
        </div>
        <div class="form-group">
          <label>Button Link</label>
          <input type="text" id="banner-button-link" value="/products">
        </div>
        <div class="form-group">
          <label>
            <input type="checkbox" id="banner-active" checked>
            Active
          </label>
        </div>
        <div class="modal-footer">
          <button type="button" onclick="closeBannerModal()">Cancel</button>
          <button type="submit">Save Banner</button>
        </div>
      </form>
    </div>
  </div>

  <!-- CATEGORY MODAL -->
  <div id="category-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Add/Edit Category</h3>
        <button class="close-btn" onclick="closeCategoryModal()">×</button>
      </div>
      <form id="category-form">
        <div class="form-group">
          <label>Name</label>
          <input type="text" id="category-name" required>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="category-description"></textarea>
        </div>
        <div class="form-group">
          <label>Image Upload</label>
          <input type="file" id="category-image" accept="image/*" onchange="previewCategoryImage()">
          <img id="category-preview" class="image-preview" style="display:none;">
        </div>
        <div class="form-group">
          <label>
            <input type="checkbox" id="category-active" checked>
            Active
          </label>
        </div>
        <div class="modal-footer">
          <button type="button" onclick="closeCategoryModal()">Cancel</button>
          <button type="submit">Save Category</button>
        </div>
      </form>
    </div>
  </div>

  <!-- PRODUCT MODAL -->
  <div id="product-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Add/Edit Product</h3>
        <button class="close-btn" onclick="closeProductModal()">×</button>
      </div>
      <form id="product-form">
        <div class="form-group">
          <label>Name</label>
          <input type="text" id="product-name" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Price</label>
            <input type="number" id="product-price" step="0.01" required>
          </div>
          <div class="form-group">
            <label>Original Price</label>
            <input type="number" id="product-original-price" step="0.01">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Category</label>
            <select id="product-category" required></select>
          </div>
          <div class="form-group">
            <label>Brand</label>
            <input type="text" id="product-brand">
          </div>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="product-description"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Stock</label>
            <input type="number" id="product-stock" min="0">
          </div>
          <div class="form-group">
            <label>SKU</label>
            <input type="text" id="product-sku">
          </div>
        </div>
        <div class="form-group">
          <label>Image Upload</label>
          <input type="file" id="product-image" accept="image/*" onchange="previewProductImage()">
          <img id="product-preview" class="image-preview" style="display:none;">
        </div>
        <div class="modal-footer">
          <button type="button" onclick="closeProductModal()">Cancel</button>
          <button type="submit">Save Product</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:5006/api/cms';
    const TOKEN = localStorage.getItem('token') || '';
    let editingBannerId = null;
    let editingCategoryId = null;
    let editingProductId = null;

    // Tab switching
    function switchTab(tab) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      document.getElementById(tab).classList.add('active');
      event.target.classList.add('active');
      
      if (tab === 'banners') loadBanners();
      if (tab === 'categories') loadCategories();
      if (tab === 'products') loadProducts();
    }

    // Load banners
    async function loadBanners() {
      try {
        const response = await fetch(`${API_URL}/banners/admin/all`, {
          headers: { 'Authorization': `Bearer ${TOKEN}` }
        });
        const banners = await response.json();
        displayBanners(banners);
      } catch (error) {
        console.error('Error loading banners:', error);
        document.getElementById('banners-list').innerHTML = '<div class="empty-state">Error loading banners</div>';
      }
    }

    function displayBanners(banners) {
      if (!banners.length) {
        document.getElementById('banners-list').innerHTML = '<div class="empty-state">No banners yet. Create one!</div>';
        return;
      }

      let html = `<table>
        <thead>
          <tr>
            <th>Title</th>
            <th>Image</th>
            <th>Active</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>`;

      banners.forEach(banner => {
        html += `<tr>
          <td>${banner.title}</td>
          <td><img src="${banner.image}" alt="${banner.title}" style="max-width:80px;border-radius:4px;"></td>
          <td>${banner.isActive ? '✅' : '❌'}</td>
          <td>
            <button class="action-btn edit-btn" onclick="editBanner('${banner._id}')">Edit</button>
            <button class="action-btn delete-btn" onclick="deleteBanner('${banner._id}')">Delete</button>
          </td>
        </tr>`;
      });

      html += `</tbody></table>`;
      document.getElementById('banners-list').innerHTML = html;
    }

    // Banner modal functions
    function openBannerModal() {
      editingBannerId = null;
      document.getElementById('banner-form').reset();
      document.getElementById('banner-preview').style.display = 'none';
      document.getElementById('banner-modal').classList.add('active');
    }

    function closeBannerModal() {
      document.getElementById('banner-modal').classList.remove('active');
    }

    function previewBannerImage() {
      const file = document.getElementById('banner-image').files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (e) => {
          document.getElementById('banner-preview').src = e.target.result;
          document.getElementById('banner-preview').style.display = 'block';
        };
        reader.readAsDataURL(file);
      }
    }

    async function editBanner(id) {
      // TODO: Fetch banner and populate form
      editingBannerId = id;
      openBannerModal();
    }

    async function deleteBanner(id) {
      if (confirm('Delete this banner?')) {
        try {
          const response = await fetch(`${API_URL}/banners/${id}`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${TOKEN}` }
          });
          if (response.ok) {
            alert('Banner deleted!');
            loadBanners();
          }
        } catch (error) {
          alert('Error deleting banner');
        }
      }
    }

    // Similar functions for categories and products...
    // Load categories
    async function loadCategories() {
      try {
        const response = await fetch(`${API_URL}/categories/admin/all`, {
          headers: { 'Authorization': `Bearer ${TOKEN}` }
        });
        const categories = await response.json();
        displayCategories(categories);
      } catch (error) {
        document.getElementById('categories-list').innerHTML = '<div class="empty-state">Error loading categories</div>';
      }
    }

    function displayCategories(categories) {
      if (!categories.length) {
        document.getElementById('categories-list').innerHTML = '<div class="empty-state">No categories yet</div>';
        return;
      }

      let html = `<table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Image</th>
            <th>Active</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>`;

      categories.forEach(cat => {
        html += `<tr>
          <td>${cat.name}</td>
          <td><img src="${cat.image}" alt="${cat.name}" style="max-width:80px;border-radius:4px;" onerror="this.src='/placeholder.png'"></td>
          <td>${cat.isActive ? '✅' : '❌'}</td>
          <td>
            <button class="action-btn edit-btn" onclick="editCategory('${cat._id}')">Edit</button>
            <button class="action-btn delete-btn" onclick="deleteCategory('${cat._id}')">Delete</button>
          </td>
        </tr>`;
      });

      html += `</tbody></table>`;
      document.getElementById('categories-list').innerHTML = html;
    }

    function openCategoryModal() {
      editingCategoryId = null;
      document.getElementById('category-form').reset();
      document.getElementById('category-preview').style.display = 'none';
      document.getElementById('category-modal').classList.add('active');
    }

    function closeCategoryModal() {
      document.getElementById('category-modal').classList.remove('active');
    }

    function previewCategoryImage() {
      const file = document.getElementById('category-image').files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (e) => {
          document.getElementById('category-preview').src = e.target.result;
          document.getElementById('category-preview').style.display = 'block';
        };
        reader.readAsDataURL(file);
      }
    }

    // Load products
    async function loadProducts() {
      try {
        const response = await fetch(`${API_URL}/products-cms`, {
          headers: { 'Authorization': `Bearer ${TOKEN}` }
        });
        const data = await response.json();
        displayProducts(data.products);
        loadCategories(); // For product form
      } catch (error) {
        document.getElementById('products-list').innerHTML = '<div class="empty-state">Error loading products</div>';
      }
    }

    function displayProducts(products) {
      if (!products.length) {
        document.getElementById('products-list').innerHTML = '<div class="empty-state">No products yet</div>';
        return;
      }

      let html = `<table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Price</th>
            <th>Category</th>
            <th>Stock</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>`;

      products.forEach(product => {
        html += `<tr>
          <td>${product.name}</td>
          <td>$${product.price}</td>
          <td>${product.category}</td>
          <td>${product.stock}</td>
          <td>
            <button class="action-btn edit-btn" onclick="editProduct('${product._id}')">Edit</button>
            <button class="action-btn delete-btn" onclick="deleteProduct('${product._id}')">Delete</button>
          </td>
        </tr>`;
      });

      html += `</tbody></table>`;
      document.getElementById('products-list').innerHTML = html;
    }

    function openProductModal() {
      editingProductId = null;
      document.getElementById('product-form').reset();
      document.getElementById('product-preview').style.display = 'none';
      document.getElementById('product-modal').classList.add('active');
    }

    function closeProductModal() {
      document.getElementById('product-modal').classList.remove('active');
    }

    function previewProductImage() {
      const file = document.getElementById('product-image').files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (e) => {
          document.getElementById('product-preview').src = e.target.result;
          document.getElementById('product-preview').style.display = 'block';
        };
        reader.readAsDataURL(file);
      }
    }

    async function editCategory(id) {
      editingCategoryId = id;
      openCategoryModal();
    }

    async function deleteCategory(id) {
      if (confirm('Delete this category?')) {
        try {
          await fetch(`${API_URL}/categories/${id}`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${TOKEN}` }
          });
          loadCategories();
        } catch (error) {
          alert('Error deleting category');
        }
      }
    }

    async function editProduct(id) {
      editingProductId = id;
      openProductModal();
    }

    async function deleteProduct(id) {
      if (confirm('Delete this product?')) {
        try {
          await fetch(`${API_URL}/products-cms/${id}`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${TOKEN}` }
          });
          loadProducts();
        } catch (error) {
          alert('Error deleting product');
        }
      }
    }

    // Initial load
    loadBanners();
  </script>
</body>
</html>
